log_level: INFO  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL

nut:
  ups: "ups@localhost"  # Format: <ups-name>@<host>

poll_interval: 15        # Seconds between UPS status checks
restore_delay_sec: 30    # Seconds to wait after power is restored before sending WOL
wol_retry_delay_sec: 30  # Seconds between WOL retry attempts
wol_max_retries: 5       # Max WOL attempts per client before giving up

discord_webhook: ""      # Optional: Discord webhook URL for failure notifications

clients:
  - name: "client 1"
    host: 192.168.0.100
    mac: "38:f7:cd:c5:87:6b"
    enabled: true
  - name: "client 2"
    host: 192.168.0.101
    mac: "aa:bb:cc:dd:ee:ff"
    enabled: false  # Will be skipped